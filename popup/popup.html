<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Sync View</h1>
    <div id="status" class="status disconnected">
      <span class="dot"></span>
      <span id="status-text">Disconnected</span>
    </div>
    <div id="now-playing" class="now-playing hidden">
      <img id="thumbnail" class="thumbnail" alt="" />
      <div class="info">
        <div id="site-badge" class="site-badge"></div>
        <div id="title" class="title"></div>
        <div id="channel" class="channel"></div>
        <div id="progress" class="progress"></div>
      </div>
    </div>
    <div id="idle-message" class="idle-message">
      No media playing
    </div>
    <div class="supported-sites">
      YouTube, Netflix, Spotify, Twitch, Hulu, Disney+, Prime Video, SoundCloud, Crunchyroll, Max, Apple TV+, Plex
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
